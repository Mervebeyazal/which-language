name: "Auto: Update Contributors"

on:
  pull_request_target:
    branches: [main]
    types: [closed]

permissions:
  contents: write
  pull-requests: read

jobs:
  update-contributors:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Determine contribution type
        id: contrib
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          CHANGED_FILES=$(gh pr view "$PR_NUMBER" --json files --jq '.files[].path')
          echo "Changed files: $CHANGED_FILES"

          ROLE=""
          if echo "$CHANGED_FILES" | grep -q '^problems/'; then
            ROLE="🎯 Problem Architect"
          elif echo "$CHANGED_FILES" | grep -q '^lib/codexes/'; then
            ROLE="🧠 Codex Whisperer"
          elif echo "$CHANGED_FILES" | grep -q '^artifacts/'; then
            ROLE="📊 Benchmark Runner"
          else
            ROLE="💻 Contributor"
          fi

          echo "role=$ROLE" >> $GITHUB_OUTPUT
          echo "Detected role: $ROLE"

      - name: Update README.md Hall of Fame
        env:
          USERNAME: ${{ github.event.pull_request.user.login }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          ROLE: ${{ steps.contrib.outputs.role }}
        run: |
          echo "Adding $USERNAME as $ROLE from PR #$PR_NUMBER"

          # Check if user already exists in README
          if grep -q "github.com/$USERNAME" README.md; then
            echo "User $USERNAME already in Hall of Fame, skipping."
            exit 0
          fi

          # Use Python to safely edit the README
          python3 << 'PYTHON_SCRIPT'
          import os, re, sys

          username = os.environ["USERNAME"]
          role = os.environ["ROLE"]

          new_cell = f'[<img src="https://github.com/{username}.png?size=100" width="100px;"/><br /><sub><b>{username}</b></sub>](https://github.com/{username})'

          with open("README.md", "r") as f:
              content = f.read()

          # Find the closing </div> after the Hall of Fame table
          # Insert a new row before </div>
          marker = "</div>"
          hall_section = content.find("## 🏆 Hall of Fame")
          if hall_section == -1:
              print("ERROR: Could not find Hall of Fame section")
              sys.exit(1)

          div_close = content.find(marker, hall_section)
          if div_close == -1:
              print("ERROR: Could not find closing </div>")
              sys.exit(1)

          # Build new contributor row
          new_row = f'\n| {new_cell} |\n| :---: |\n| {role} |\n\n'

          # Insert before </div>
          new_content = content[:div_close] + new_row + content[div_close:]

          with open("README.md", "w") as f:
              f.write(new_content)

          print(f"Successfully added {username} to Hall of Fame as {role}")
          PYTHON_SCRIPT

      - name: Update CHANGELOG.md
        env:
          USERNAME: ${{ github.event.pull_request.user.login }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          ROLE: ${{ steps.contrib.outputs.role }}
        run: |
          python3 << 'PYTHON_SCRIPT'
          import os, sys
          from datetime import datetime

          username = os.environ["USERNAME"]
          pr_number = os.environ["PR_NUMBER"]
          pr_title = os.environ["PR_TITLE"]
          role = os.environ["ROLE"]

          with open("CHANGELOG.md", "r") as f:
              content = f.read()

          # Find the [Unreleased] section
          unreleased_marker = "## [Unreleased]"
          idx = content.find(unreleased_marker)
          if idx == -1:
              print("ERROR: Could not find [Unreleased] section in CHANGELOG.md")
              sys.exit(1)

          # Insert after the [Unreleased] header line
          insert_pos = content.find("\n", idx) + 1

          # Check if this PR is already recorded
          if f"#{pr_number}" in content:
              print(f"PR #{pr_number} already in CHANGELOG.md, skipping.")
              sys.exit(0)

          entry = f"\n- {pr_title} by @{username} (#{pr_number}) — {role}\n"
          new_content = content[:insert_pos] + entry + content[insert_pos:]

          with open("CHANGELOG.md", "w") as f:
              f.write(new_content)

          print(f"Added PR #{pr_number} to CHANGELOG.md [Unreleased] section")
          PYTHON_SCRIPT

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md CHANGELOG.md
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "docs: add @${{ github.event.pull_request.user.login }} to Hall of Fame (#${{ github.event.pull_request.number }})"
          git push

